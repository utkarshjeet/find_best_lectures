<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study</title>
    <script src="./script.js" defer></script>
    <style>
  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
    margin-top: 20px;
  }

  .card {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
  }

  .card img {
    width: 100%;
    height: auto;
    border-radius: 6px;
  }

  .card a {
    display: inline-block;
    margin-top: 8px;
    color: blue;
    text-decoration: none;
    font-weight: bold;
  }
</style>
</head>
<body>
    
   <div>
  <h1>Study With Passion</h1>
  <input type="text" id="searchInput" placeholder="Search Corn Videos">
  <button id="searchButton">Search</button>

  <div id="results"></div>
</div>


</body>
</html>
